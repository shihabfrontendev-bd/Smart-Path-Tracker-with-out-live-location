<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Journey - Created by Rafiatul Shihab</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --bg: #f4f7f6; --surface: #ffffff; --card: #f9fbfd; --border: #d1d9e6;
      --accent: #2d89ef; --accent2: #e67e22; --text: #2c3e50; --muted: #7f8c8d;
      --radius: 14px; --header-bg: #ffffff;
    }

    [data-theme="dark"] {
      --bg: #0b0f1a; --surface: #131929; --card: #1b2438; --border: #2a3550;
      --accent: #4f9eff; --accent2: #f7c948; --text: #e8edf5; --muted: #7a8aaa;
      --header-bg: #131929;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s; }
    
    header { 
      padding: 0.8rem 1.5rem; display: flex; align-items: center; justify-content: space-between; 
      border-bottom: 1px solid var(--border); background: var(--header-bg); z-index: 1000; flex-shrink: 0;
    }

    .layout { display: grid; grid-template-columns: 400px 1fr; flex: 1; overflow: hidden; position: relative; }
    
    .sidebar { 
      background: var(--surface); border-right: 1px solid var(--border); 
      overflow-y: auto; padding: 0 1.2rem 1.2rem 1.2rem; display: flex; flex-direction: column; 
      scroll-behavior: smooth;
    }

    /* Fixed Header inside Sidebar */
    .form-wrapper { position: sticky; top: 0; background: var(--surface); padding: 1.2rem 0; z-index: 100; transition: all 0.4s ease; }
    .form-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; transition: all 0.4s ease; }

    /* --- মোবাইল ডাইনামিক লেআউট ফিক্স --- */
    @media (max-width: 850px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 45vh 55vh; transition: grid-template-rows 0.4s ease; }
      
      /* স্ক্রল করলে ম্যাপ ছোট হওয়ার জন্য ক্লাস */
      .layout.scrolled { grid-template-rows: 20vh 80vh; }
      
      .sidebar { order: 2; border-right: none; border-top: 1px solid var(--border); }
      #map { order: 1; height: 100% !important; transition: height 0.4s ease; }

      /* স্ক্রল করলে সার্চ বক্স ছোট হওয়া */
      .scrolled .form-card { padding: 0.5rem; }
      .scrolled .form-card input { margin-bottom: 0.3rem; padding: 0.4rem; font-size: 0.75rem; }
      .scrolled .btn { padding: 0.5rem; font-size: 0.8rem; }
    }

    input { width: 100%; padding: 0.7rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); margin-bottom: 0.7rem; font-size: 0.85rem; outline: none; }
    .btn { width: 100%; padding: 0.8rem; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }

    .segment-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; border-left: 4px solid transparent; transition: 0.3s; cursor: pointer; margin-bottom: 12px; }
    .segment-card.active { border-left: 6px solid var(--accent); background: var(--surface); box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-color: var(--accent); }

    .weather-info { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; font-size: 0.8rem; }
    .weather-badge { background: rgba(45,137,239,0.08); padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(45,137,239,0.15); text-align: center; }
    .seat-advice { margin-top: 8px; padding: 6px; background: rgba(230,126,34,0.1); border-radius: 6px; font-size: 0.75rem; color: var(--accent2); border: 1px dashed var(--accent2); }

    #map { width: 100%; height: 100%; z-index: 1; }
    .sidebar-footer { margin-top: 20px; padding-bottom: 20px; text-align: center; font-size: 0.7rem; color: var(--muted); border-top: 1px dashed var(--border); padding-top: 15px; }
  </style>
</head>
<body data-theme="light">

<header>
  <div style="display:flex; flex-direction:column;">
    <h1 style="font-family:'Syne'; font-size:1.1rem;">Smart <span style="color:var(--accent);">Path Tracker</span></h1>
    <span style="font-size:0.7rem; color:var(--muted);">Created by Rafiatul Shihab</span>
  </div>
  <button class="btn" id="theme-btn" style="width:auto; padding: 5px 12px;" onclick="toggleTheme()">🌙 Dark</button>
</header>

<div class="layout" id="main-layout">
  <div class="sidebar" id="sidebar">
    <div class="form-wrapper">
        <div class="form-card">
          <input type="text" id="origin" placeholder="Start" value="Dhaka" />
          <input type="text" id="destination" placeholder="Destination" value="Panchagarh" />
          <input type="datetime-local" id="depart-time" />
          <button class="btn" onclick="planRoute()">SEARCH ROUTE</button>
        </div>
    </div>
    
    <div id="list-container">
      <p style="text-align:center; padding:20px; color:var(--muted);">Search to see checkpoints...</p>
    </div>
    
    <div class="sidebar-footer">© 2026 Smart Path Tracker | <b>Rafiatul Shihab</b></div>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const ORS_KEY     = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjQ5M2VkZTFmYTUyNjQwYzdhMGE2YjhkZTA0ZTlhNzliIiwiaCI6Im11cm11cjY0In0=';
const WEATHER_KEY = 'c3dc582140449c6eb28a93bfb6af2a08';

const map = L.map('map', { zoomControl: false }).setView([23.81, 90.41], 7);
const lightLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
const darkLayer  = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

let currentTheme = 'light';
let markers = [];
let routeLayer = null;

/* --- ডাইনামিক স্ক্রল ইফেক্ট --- */
const sidebar = document.getElementById('sidebar');
const layout = document.getElementById('main-layout');

sidebar.addEventListener('scroll', () => {
    if (window.innerWidth <= 850) {
        if (sidebar.scrollTop > 50) {
            layout.classList.add('scrolled');
        } else {
            layout.classList.remove('scrolled');
        }
    }
});

function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('theme-btn');
    if(currentTheme === 'light') {
        body.setAttribute('data-theme', 'dark');
        btn.innerHTML = '☀️ Light';
        map.removeLayer(lightLayer); darkLayer.addTo(map);
        currentTheme = 'dark';
    } else {
        body.removeAttribute('data-theme');
        btn.innerHTML = '🌙 Dark';
        map.removeLayer(darkLayer); lightLayer.addTo(map);
        currentTheme = 'light';
    }
}

window.onload = () => {
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('depart-time').value = now.toISOString().slice(0, 16);
};

async function planRoute() {
    const origin = document.getElementById('origin').value;
    const dest = document.getElementById('destination').value;
    const startTime = new Date(document.getElementById('depart-time').value);
    const container = document.getElementById('list-container');
    
    container.innerHTML = "<p style='text-align:center; padding:20px;'>Calculating...</p>";

    try {
        const gS = await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${ORS_KEY}&text=${encodeURIComponent(origin)}&size=1`).then(r=>r.json());
        const gE = await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${ORS_KEY}&text=${encodeURIComponent(dest)}&size=1`).then(r=>r.json());
        const res = await fetch(`https://api.openrouteservice.org/v2/directions/driving-car?api_key=${ORS_KEY}&start=${gS.features[0].geometry.coordinates.join(',')}&end=${gE.features[0].geometry.coordinates.join(',')}`).then(r=>r.json());
        
        const routeData = res.features[0];
        const points = routeData.geometry.coordinates;
        const summary = routeData.properties.summary;

        if (routeLayer) map.removeLayer(routeLayer);
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        container.innerHTML = "";

        routeLayer = L.geoJSON(routeData, { style: { color: '#e74c3c', weight: 5 } }).addTo(map);
        map.fitBounds(routeLayer.getBounds(), { padding: [30, 30] });

        const steps = 8;
        for(let i=0; i < steps; i++) {
            const idx = Math.floor((points.length - 1) * (i / (steps - 1)));
            const p = points[idx];
            const w = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${p[1]}&lon=${p[0]}&appid=${WEATHER_KEY}&units=metric`).then(r=>r.json());
            const n = await fetch(`https://api.openrouteservice.org/geocode/reverse?api_key=${ORS_KEY}&point.lat=${p[1]}&point.lon=${p[0]}&size=1`).then(r=>r.json());
            
            const arrival = new Date(startTime.getTime() + (summary.duration / (steps - 1)) * i * 1000);
            const timeStr = arrival.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            const data = {
                place: n.features[0]?.properties.county || n.features[0]?.properties.name || "Checkpoint",
                time: timeStr, temp: Math.round(w.main.temp), desc: w.weather[0].description,
                humidity: w.main.humidity, icon: w.weather[0].icon,
                seat: (arrival.getHours() >= 6 && arrival.getHours() < 12) ? "Left Side Shaded" : (arrival.getHours() >= 12 && arrival.getHours() < 18) ? "Right Side Shaded" : "Night: Any seat ok"
            };

            const card = document.createElement('div');
            card.className = 'segment-card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; font-weight:700;"><span>📍 ${data.place}</span><span>${data.temp}°C</span></div>
                <div style="font-size:0.8rem; color:var(--muted); margin:4px 0;">🕒 Arrival: ${timeStr}</div>
                <div class="weather-info"><div class="weather-badge">☁️ ${data.desc}</div><div class="weather-badge">💧 Hum: ${data.humidity}%</div></div>
                <div class="seat-advice">🪟 ${data.seat}</div>
            `;

            const marker = L.circleMarker([p[1], p[0]], {radius: 7, color: '#fff', weight: 2, fillColor: '#2d89ef', fillOpacity: 1}).addTo(map);
            card.onclick = () => {
                document.querySelectorAll('.segment-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                map.panTo([p[1], p[0]]);
            };
            container.appendChild(card);
            markers.push(marker);
        }
    } catch (e) { container.innerHTML = "Error!"; }
}
</script>
</body>
</html>
